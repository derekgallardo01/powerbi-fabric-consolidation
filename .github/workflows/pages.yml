name: Deploy live demo to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Render the campgrounds dashboard (default) into site/campgrounds
        run: python cli.py --out site/campgrounds

      - name: Render the campgrounds dashboard with a tight 2% variance threshold
        run: python cli.py --variance-threshold 2.0 --out site/campgrounds-tight

      - name: Render the hospitality dashboard into site/hospitality
        run: python cli.py --data data-hospitality --out site/hospitality

      - name: Rename each dashboard.html to index.html so the dirs serve directly
        run: |
          for d in site/campgrounds site/campgrounds-tight site/hospitality; do
            mv "$d/dashboard.html" "$d/index.html"
          done

      - name: Create the top-level demos landing page
        run: |
          cat > site/index.html <<'EOF'
          <!DOCTYPE html>
          <html lang="en"><head><meta charset="utf-8">
          <title>Power BI / Fabric multi-entity consolidation — live demos</title>
          <style>
            body{font-family:Segoe UI,Arial,sans-serif;max-width:760px;margin:3rem auto;padding:0 1.5rem;color:#222;background:#f3f4f6}
            h1{font-size:1.5rem;margin-bottom:.5rem}
            .lead{color:#555;font-size:.95rem;margin-top:0}
            a{color:#2b6cb0}
            .card{background:#fff;border:1px solid #e5e7eb;border-radius:8px;padding:1rem 1.25rem;margin:1rem 0}
            .card h2{margin:0 0 .35rem;font-size:1.1rem}
            .card p{margin:.35rem 0;color:#555;font-size:.95rem}
            .meta{color:#888;font-size:.85rem;margin-top:2rem}
            code{background:#eef0f3;padding:1px 6px;border-radius:4px;font-size:.9em}
          </style>
          </head><body>
          <h1>Multi-entity consolidation — live demos</h1>
          <p class="lead">Three rendered dashboards from the same engine, two different industries plus an alerts-on view.</p>

          <div class="card">
            <h2><a href="./campgrounds/">Campgrounds — default</a></h2>
            <p>Three KOA entities consolidated. Default variance threshold (±10%) — no alerts.</p>
          </div>

          <div class="card">
            <h2><a href="./campgrounds-tight/">Campgrounds — tight threshold</a></h2>
            <p>Same data, variance threshold set to ±2% so the modest budget variance surfaces as ALERT badges.</p>
          </div>

          <div class="card">
            <h2><a href="./hospitality/">Hospitality — three hotels</a></h2>
            <p>Different industry, different chart of accounts, different seasonality. Hotels run an unfavourable budget — variance is negative — proves the engine flags both directions.</p>
          </div>

          <p class="meta">All three generated by <code>python cli.py [...]</code> on every push.
          Source: <a href="https://github.com/derekgallardo01/powerbi-fabric-consolidation">github.com/derekgallardo01/powerbi-fabric-consolidation</a></p>
          </body></html>
          EOF

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v4
